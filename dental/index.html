<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="ngrok-skip-browser-warning" content="true">
<title>SmilePro — Запись к стоматологу</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080D18;
  --bg2:       #0E1525;
  --card:      #121C2E;
  --card2:     #182135;
  --border:    #1E2D45;
  --border2:   #243450;
  --a1:        #4776E6;
  --a2:        #8E54E9;
  --grad:      linear-gradient(135deg, #4776E6 0%, #8E54E9 100%);
  --grad-soft: linear-gradient(135deg, rgba(71,118,230,.15) 0%, rgba(142,84,233,.15) 100%);
  --success:   #00D2A3;
  --danger:    #FF5757;
  --warn:      #FFB836;
  --t1:        #EEF2FF;
  --t2:        #7A90B8;
  --t3:        #3A4F6E;
  --r1: 20px; --r2: 16px; --r3: 12px;
  --sh: 0 8px 32px rgba(0,0,0,.45);
  --sh2: 0 4px 16px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Manrope',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{display:none}

/* ── UTILITIES ── */
.g{background:var(--grad)}.gt{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-blue{background:rgba(71,118,230,.18);color:#7EA8FF}
.badge-green{background:rgba(0,210,163,.15);color:var(--success)}
.badge-warn{background:rgba(255,184,54,.15);color:var(--warn)}
.badge-purple{background:rgba(142,84,233,.18);color:#B88AFF}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(8,13,24,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.hdr-logo{display:flex;align-items:center;gap:9px}
.hdr-icon{width:34px;height:34px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(71,118,230,.4)}
.hdr-name{font-size:17px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer;border-radius:10px;transition:.2s;border:1px solid var(--border)}
.hdr-back:hover{background:var(--card2);color:var(--t1)}
.hdr-close{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer;border-radius:10px;transition:.2s}
.hdr-close:hover{background:var(--card2)}

/* ── NAV TABS ── */
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(14,21,37,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;transition:.2s;border:none;background:none;font-family:inherit;position:relative}
.tab.on{color:var(--a1)}
.tab.on::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--grad);border-radius:0 0 4px 4px}
.tab svg{width:22px;height:22px;transition:.2s}
.tab.on svg{filter:drop-shadow(0 0 6px rgba(71,118,230,.7))}

/* ── PROGRESS ── */
.prog{padding:16px 18px 0}
.prog-dots{display:flex;align-items:center;gap:0}
.prog-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:.4s;flex-shrink:0}
.prog-dot.done{background:var(--grad);color:#fff;box-shadow:0 0 12px rgba(71,118,230,.5)}
.prog-dot.active{background:var(--grad);color:#fff;box-shadow:0 0 16px rgba(71,118,230,.7);transform:scale(1.1)}
.prog-dot.todo{background:var(--card2);color:var(--t3);border:1.5px solid var(--border2)}
.prog-line{flex:1;height:2px;background:var(--border2);transition:.4s}
.prog-line.done{background:var(--grad)}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.prog-label{font-size:12px;color:var(--t3);font-weight:600}
.prog-step{font-size:12px;color:var(--t2);font-weight:600}

/* ── STEP CONTENT ── */
.content{padding:20px 18px 130px;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.s-tag{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.s-title{font-size:26px;font-weight:900;margin-bottom:4px;line-height:1.2}
.s-sub{font-size:13px;color:var(--t2);margin-bottom:22px;line-height:1.5}

/* ── DOCTOR CARDS ── */
.doc-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r1);padding:16px;cursor:pointer;transition:.25s;margin-bottom:10px;position:relative;overflow:hidden}
.doc-card::before{content:'';position:absolute;inset:0;background:var(--grad-soft);opacity:0;transition:.25s}
.doc-card:hover,.doc-card.sel{border-color:var(--a1)}
.doc-card.sel::before,.doc-card:hover::before{opacity:1}
.doc-card.sel{box-shadow:0 0 0 1.5px var(--a1), var(--sh2)}
.doc-avatar{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0;position:relative;z-index:1}
.doc-info{flex:1;min-width:0;position:relative;z-index:1}
.doc-name{font-size:15px;font-weight:700;margin-bottom:3px}
.doc-role{font-size:12px;color:var(--t2);margin-bottom:8px}
.doc-meta{display:flex;gap:6px;flex-wrap:wrap}
.doc-stars{font-size:12px;color:var(--warn);font-weight:700}
.doc-check{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;z-index:1;opacity:0;transition:.25s;transform:scale(0)}
.doc-card.sel .doc-check{opacity:1;transform:scale(1)}

/* ── SERVICE CARDS ── */
.svc-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r1);padding:16px;cursor:pointer;transition:.25s;margin-bottom:10px;position:relative;overflow:hidden}
.svc-card::before{content:'';position:absolute;inset:0;background:var(--grad-soft);opacity:0;transition:.25s}
.svc-card:hover,.svc-card.sel{border-color:var(--a1)}
.svc-card.sel::before,.svc-card:hover::before{opacity:1}
.svc-card.sel{box-shadow:0 0 0 1.5px var(--a1), var(--sh2)}
.svc-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;z-index:1}
.svc-body{flex:1;min-width:0;position:relative;z-index:1}
.svc-name{font-size:15px;font-weight:700;margin-bottom:3px}
.svc-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.svc-price{font-size:13px;font-weight:700;color:var(--a1)}
.svc-check{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;z-index:1;opacity:0;transition:.25s;transform:scale(0)}
.svc-card.sel .svc-check{opacity:1;transform:scale(1)}

/* ── DATE PICKER ── */
.month-label{font-size:14px;font-weight:700;color:var(--t2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.date-wrap{overflow-x:auto;margin:0 -18px;padding:0 18px}
.date-row{display:flex;gap:8px;padding-bottom:4px}
.date-chip{display:flex;flex-direction:column;align-items:center;min-width:64px;padding:10px 6px 12px;border-radius:var(--r2);background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:.25s;gap:1px}
.date-chip:hover{background:var(--card2);border-color:var(--border2)}
.date-chip.sel{background:var(--grad);border-color:transparent;box-shadow:0 4px 16px rgba(71,118,230,.4)}
.date-chip.sel *{color:#fff!important}
.date-chip .dc-today{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--a1);text-transform:uppercase;height:14px}
.date-chip .dc-day{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase}
.date-chip .dc-num{font-size:22px;font-weight:900;line-height:1.1}
.date-chip .dc-mon{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase}

/* ── TIME SLOTS ── */
.time-group-label{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 10px}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.t-slot{padding:12px 4px;border-radius:var(--r3);background:var(--card);border:1.5px solid var(--border);text-align:center;font-size:14px;font-weight:600;cursor:pointer;transition:.25s}
.t-slot:hover{background:var(--card2);border-color:var(--border2)}
.t-slot.sel{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(71,118,230,.45)}
.t-slot.dis{opacity:.3;pointer-events:none}

/* ── FORM ── */
.fg{margin-bottom:14px;position:relative}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;padding:14px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--t1);font-family:inherit;font-size:15px;outline:none;transition:.2s}
.fi:focus{border-color:var(--a1);background:var(--card2);box-shadow:0 0 0 3px rgba(71,118,230,.15)}
.fi::placeholder{color:var(--t3)}
textarea.fi{resize:vertical;min-height:88px}

/* ── SUMMARY ── */
.smr{background:var(--card);border-radius:var(--r1);overflow:hidden;border:1.5px solid var(--border)}
.smr-head{padding:18px 20px;background:var(--grad);position:relative;overflow:hidden}
.smr-head::after{content:'🦷';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.2}
.smr-head-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.smr-head-doc{font-size:18px;font-weight:800;color:#fff}
.smr-body{padding:4px 0}
.smr-row{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 20px;border-bottom:1px solid var(--border)}
.smr-row:last-child{border-bottom:none}
.smr-k{font-size:12px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.smr-v{font-size:14px;font-weight:700;text-align:right;max-width:60%}

/* ── BOTTOM BAR ── */
.bbar{position:fixed;bottom:0;left:0;right:0;padding:12px 18px;padding-bottom:max(16px,env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:100}
.btn{width:100%;padding:17px;border:none;border-radius:var(--r2);background:var(--grad);color:#fff;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;transition:.25s;box-shadow:0 6px 24px rgba(71,118,230,.4);position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,.15);transform:skewX(-20deg);transition:.5s}
.btn:hover::after{left:120%}
.btn:active{transform:scale(.98)}
.btn:disabled{background:var(--card2);color:var(--t3);box-shadow:none;cursor:not-allowed}
.btn:disabled::after{display:none}

/* ── MAIN SCREEN ── */
.main{padding:16px 18px 100px}
.hero{border-radius:var(--r1);padding:24px 22px;margin-bottom:18px;position:relative;overflow:hidden;background:var(--card);border:1px solid var(--border)}
.hero::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:.08}
.hero-glow{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(71,118,230,.3),transparent 70%);top:-60px;right:-60px}
.hero-glow2{position:absolute;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(142,84,233,.25),transparent 70%);bottom:-40px;left:-30px}
.hero-greet{font-size:13px;color:var(--t2);margin-bottom:4px;position:relative;z-index:1}
.hero-name{font-size:22px;font-weight:900;margin-bottom:10px;position:relative;z-index:1}
.hero-desc{font-size:13px;color:var(--t2);line-height:1.6;position:relative;z-index:1;max-width:260px}
.hero-stats{display:flex;gap:20px;margin-top:16px;position:relative;z-index:1}
.hero-stat{display:flex;flex-direction:column}
.hero-stat-num{font-size:20px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-stat-lab{font-size:11px;color:var(--t3);font-weight:600}

.act-grid{display:flex;flex-direction:column;gap:10px}
.act-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r1);padding:18px 16px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.act-card:hover{background:var(--card2);border-color:var(--border2);transform:translateY(-1px)}
.act-card:active{transform:translateY(0)}
.act-ico{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.act-body{flex:1}
.act-name{font-size:15px;font-weight:700;margin-bottom:3px}
.act-desc{font-size:13px;color:var(--t2)}
.act-arr{color:var(--t3)}
.chevron{display:flex;align-items:center;justify-content:center}

/* ── RECORDS ── */
.rec-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r1);padding:16px;margin-bottom:10px;transition:.2s}
.rec-card:hover{border-color:var(--border2)}
.rec-doc{font-size:15px;font-weight:700;margin-bottom:3px}
.rec-svc{font-size:13px;color:var(--t2);margin-bottom:10px}
.rec-date{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--t1)}
.rec-actions{display:flex;gap:8px;margin-top:12px}
.rec-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:none;font-family:inherit;cursor:pointer;transition:.2s}
.rec-btn-cancel{background:rgba(255,87,87,.12);color:var(--danger)}
.rec-btn-cancel:hover{background:rgba(255,87,87,.2)}
.rec-btn-detail{background:var(--card2);color:var(--t1)}
.rec-btn-detail:hover{background:var(--border2)}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:var(--t2)}
.empty-ico{font-size:52px;margin-bottom:16px;display:block;filter:grayscale(.5)}
.empty p{font-size:14px;line-height:1.6}

/* ── SUCCESS ── */
.suc{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 20px}
.suc-ring{width:100px;height:100px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:pop .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(71,118,230,.5)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.suc-title{font-size:26px;font-weight:900;margin-bottom:8px}
.suc-desc{font-size:14px;color:var(--t2);line-height:1.6;max-width:280px;margin-bottom:24px}
.suc-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r1);padding:16px 20px;width:100%;text-align:left}
.suc-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.suc-row:last-child{border:none}
.suc-row span:first-child{color:var(--t2)}
.suc-row span:last-child{font-weight:700}
</style>
</head>
<body>
<div id="app"></div>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

const DOCTORS = [
  { id:1, name:'Анна Петрова',    role:'Стоматолог-терапевт', initials:'АП', color:'linear-gradient(135deg,#4776E6,#8E54E9)', rating:'4.9', exp:'8 лет', patients:'1.2к', tag:'Взрослые', avail:true },
  { id:2, name:'Иван Сидоров',    role:'Ортодонт',            initials:'ИС', color:'linear-gradient(135deg,#11998E,#38EF7D)', rating:'4.8', exp:'12 лет', patients:'980', tag:'Брекеты', avail:true },
  { id:3, name:'Мария Козлова',   role:'Хирург-имплантолог',  initials:'МК', color:'linear-gradient(135deg,#F7971E,#FFD200)', rating:'5.0', exp:'15 лет', patients:'2.1к', tag:'Импланты', avail:false },
  { id:4, name:'Дмитрий Волков',  role:'Пародонтолог',        initials:'ДВ', color:'linear-gradient(135deg,#FF416C,#FF4B2B)', rating:'4.7', exp:'6 лет', patients:'640', tag:'Дёсны', avail:true },
];

const SERVICES = {
  1:[
    {id:'s1',name:'Консультация',           icon:'💬', desc:'Первичный осмотр', price:'от 500 ₽',  dur:'30 мин', popular:false},
    {id:'s2',name:'Лечение кариеса',         icon:'🦷', desc:'Пломбировка зуба', price:'от 1 500 ₽',dur:'60 мин', popular:true},
    {id:'s3',name:'Профессиональная чистка', icon:'✨', desc:'Ультразвук + Air-Flow', price:'от 2 000 ₽',dur:'60 мин', popular:false},
    {id:'s4',name:'Отбеливание',             icon:'⭐', desc:'Zoom 4 / Beyond',  price:'от 5 000 ₽',dur:'90 мин', popular:true},
  ],
  2:[
    {id:'s5',name:'Консультация ортодонта',  icon:'💬', desc:'Анализ прикуса', price:'от 1 000 ₽',dur:'40 мин', popular:false},
    {id:'s6',name:'Установка брекетов',      icon:'🔧', desc:'Металл / керамика', price:'от 25 000 ₽',dur:'120 мин',popular:true},
    {id:'s7',name:'Элайнеры Invisalign',     icon:'🌀', desc:'Прозрачные капы', price:'от 30 000 ₽',dur:'90 мин', popular:false},
  ],
  3:[
    {id:'s8', name:'Консультация хирурга',   icon:'💬', desc:'Диагностика',      price:'от 1 000 ₽',dur:'30 мин', popular:false},
    {id:'s9', name:'Имплантация',            icon:'🔩', desc:'Straumann / Nobel', price:'от 35 000 ₽',dur:'90 мин', popular:true},
    {id:'s10',name:'Удаление зуба',          icon:'❌', desc:'Простое / сложное', price:'от 2 500 ₽',dur:'45 мин', popular:false},
  ],
  4:[
    {id:'s11',name:'Консультация',           icon:'💬', desc:'Осмотр дёсен',     price:'от 800 ₽',  dur:'30 мин', popular:false},
    {id:'s12',name:'Лечение дёсен',          icon:'💊', desc:'Комплексное',       price:'от 3 000 ₽',dur:'60 мин', popular:true},
    {id:'s13',name:'Кюретаж',               icon:'🩺', desc:'Закрытый / открытый',price:'от 4 500 ₽',dur:'75 мин', popular:false},
  ],
};

const TIMES = {
  morning:  ['09:00','09:30','10:00','10:30','11:00','11:30'],
  afternoon:['13:00','13:30','14:00','14:30','15:00','15:30'],
  evening:  ['16:00','16:30','17:00','17:30'],
};
const DAYS_S=['ВС','ПН','ВТ','СР','ЧТ','ПТ','СБ'];
const MONS_S=['ЯНВ','ФЕВ','МАР','АПР','МАЙ','ИЮН','ИЮЛ','АВГ','СЕН','ОКТ','НОЯ','ДЕК'];
const MONS_F=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MONS_N=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

let view='main', step=1;
let doc=null, svc=null, dt=null, tm=null;
let uname=tg.initDataUnsafe?.user?.first_name||'', uphone='', ucmt='';
let records=[];

const disabled=new Set();
const keys=[...TIMES.morning,...TIMES.afternoon,...TIMES.evening];
while(disabled.size<3) disabled.add(keys[Math.floor(Math.random()*keys.length)]);

function dates(){
  const a=[];const now=new Date();
  for(let i=0;i<14;i++){const d=new Date(now);d.setDate(d.getDate()+i);a.push(d);}
  return a;
}

/* ─── RENDER ─── */
function render(){
  document.getElementById('app').innerHTML=
    view==='main'    ? rMain()    :
    view==='booking' ? rBook()    :
    view==='records' ? rRec()     :
                       rHist();
  bind();
}

function rHdr(showBack=false){
  return `<div class="hdr">
    <div class="hdr-logo">
      ${showBack?`<div class="hdr-back" onclick="goBack()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></div>`:''}
      <div class="hdr-icon">🦷</div>
      <div class="hdr-name">SmilePro</div>
    </div>
    <div class="hdr-close" onclick="currentView='main';view='main';render()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>`;
}

function rTabs(){
  const T=(v,ico,lbl)=>`<button class="tab ${view===v?'on':''}" onclick="view='${v}';render()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${ico}</svg>
    ${lbl}
  </button>`;
  return `<div class="tabs">
    ${T('main','<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>','Главная')}
    ${T('booking','<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/>','Записаться')}
    ${T('records','<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>','Мои записи')}
    ${T('history','<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>','История')}
  </div>`;
}

function rMain(){
  const greet=tg.initDataUnsafe?.user?.first_name?`Привет, ${tg.initDataUnsafe.user.first_name}! 👋`:'Добро пожаловать! 👋';
  const openBook=`view='booking';step=1;doc=null;svc=null;dt=null;tm=null;uname=tg.initDataUnsafe?.user?.first_name||'';uphone='';ucmt='';render()`;
  return rHdr()+ `<div class="main">
    <div class="hero">
      <div class="hero-glow"></div><div class="hero-glow2"></div>
      <div class="hero-greet">${greet}</div>
      <div class="hero-name" style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">SmilePro Clinic</div>
      <div class="hero-desc">Запишитесь к лучшим специалистам. Быстро, удобно, без ожидания.</div>
      <div class="hero-stats">
        <div class="hero-stat"><span class="hero-stat-num">4</span><span class="hero-stat-lab">Врача</span></div>
        <div class="hero-stat"><span class="hero-stat-num">13+</span><span class="hero-stat-lab">Услуг</span></div>
        <div class="hero-stat"><span class="hero-stat-num">8</span><span class="hero-stat-lab">Лет</span></div>
        <div class="hero-stat"><span class="hero-stat-num">4.9★</span><span class="hero-stat-lab">Рейтинг</span></div>
      </div>
    </div>
    <div class="act-grid">
      <div class="act-card" onclick="${openBook}">
        <div class="act-ico" style="background:linear-gradient(135deg,rgba(71,118,230,.25),rgba(142,84,233,.25))">📅</div>
        <div class="act-body"><div class="act-name">Записаться на приём</div><div class="act-desc">Выберите врача, услугу и время</div></div>
        <div class="act-arr"><svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
      <div class="act-card" onclick="view='records';render()">
        <div class="act-ico" style="background:linear-gradient(135deg,rgba(0,210,163,.2),rgba(0,150,120,.2))">📋</div>
        <div class="act-body"><div class="act-name">Мои записи</div><div class="act-desc">Активные и предстоящие визиты</div></div>
        <div class="act-arr"><svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
      <div class="act-card" onclick="view='history';render()">
        <div class="act-ico" style="background:linear-gradient(135deg,rgba(255,184,54,.2),rgba(255,100,0,.2))">🕐</div>
        <div class="act-body"><div class="act-name">История визитов</div><div class="act-desc">Прошедшие записи и отзывы</div></div>
        <div class="act-arr"><svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
    </div>
  </div>${rTabs()}`;
}

function rProg(){
  const total=6;
  let dots='';
  for(let i=1;i<=total;i++){
    const cls=i<step?'done':i===step?'active':'todo';
    dots+=`<div class="prog-dot ${cls}">${i<step?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`:i}</div>`;
    if(i<total) dots+=`<div class="prog-line ${i<step?'done':''}"></div>`;
  }
  const labels=['Врач','Услуга','Дата','Время','Данные','Итог'];
  return `<div class="prog">${dots}<div class="prog-meta"><span class="prog-label">${labels[step-1]||''}</span><span class="prog-step">ШАГ ${step} / ${total}</span></div></div>`;
}

function rBook(){
  if(step===7) return rHdr()+rSuccess();
  let body='';

  if(step===1){
    body=`<div class="s-tag">Шаг 1</div><div class="s-title">Выберите врача</div>
    <div class="s-sub">Выберите специалиста для вашего визита</div>
    ${DOCTORS.map(d=>`
      <div class="doc-card ${doc&&doc.id===d.id?'sel':''}" data-doc="${d.id}">
        <div class="doc-avatar" style="background:${d.color}">${d.initials}</div>
        <div class="doc-info">
          <div class="doc-name">${d.name}</div>
          <div class="doc-role">${d.role}</div>
          <div class="doc-meta">
            <span class="badge badge-blue">${d.exp}</span>
            <span class="doc-stars">★ ${d.rating}</span>
            ${d.avail?'<span class="badge badge-green">● Доступен</span>':'<span class="badge badge-warn">⏳ Занят</span>'}
          </div>
        </div>
        <div class="doc-check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      </div>`).join('')}`;
  }

  else if(step===2){
    const svcs=SERVICES[doc.id]||[];
    body=`<div class="s-tag">Шаг 2</div><div class="s-title">Выберите услугу</div>
    <div class="s-sub" style="display:flex;align-items:center;gap:8px">
      <div style="width:28px;height:28px;border-radius:8px;background:${doc.color};display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0">${doc.initials}</div>
      ${doc.name} · ${doc.role}
    </div>
    ${svcs.map(s=>`
      <div class="svc-card ${svc&&svc.id===s.id?'sel':''}" data-svc="${s.id}">
        <div class="svc-icon" style="background:${svc&&svc.id===s.id?'rgba(71,118,230,.3)':'rgba(71,118,230,.12)'}">${s.icon}</div>
        <div class="svc-body">
          <div class="svc-name">${s.name}${s.popular?'&nbsp;<span class="badge badge-purple" style="font-size:10px;padding:2px 7px">ХИТ</span>':''}</div>
          <div class="svc-meta">
            <span class="svc-price">${s.price}</span>
            <span class="badge badge-blue">${s.dur}</span>
          </div>
        </div>
        <div class="svc-check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      </div>`).join('')}`;
  }

  else if(step===3){
    const ds=dates(); const today=new Date(); today.setHours(0,0,0,0);
    const curMon=MONS_N[ds[0].getMonth()]+' '+ds[0].getFullYear();
    body=`<div class="s-tag">Шаг 3</div><div class="s-title">Выберите дату</div>
    <div class="s-sub">${doc.name} · ${svc.name}</div>
    <div class="month-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${curMon}</div>
    <div class="date-wrap"><div class="date-row">
      ${ds.map((d,i)=>{
        const isT=d.toDateString()===today.toDateString();
        const sel=dt&&d.toDateString()===dt.toDateString();
        return `<div class="date-chip ${sel?'sel':''}" data-date="${i}">
          <span class="dc-today">${isT?'СЕГОДНЯ':''}</span>
          <span class="dc-day">${DAYS_S[d.getDay()]}</span>
          <span class="dc-num">${d.getDate()}</span>
          <span class="dc-mon">${MONS_S[d.getMonth()]}</span>
        </div>`;
      }).join('')}
    </div></div>`;
  }

  else if(step===4){
    const G=(label,key)=>`
      <div class="time-group-label">${label}</div>
      <div class="time-grid">
        ${TIMES[key].map(t=>`<div class="t-slot ${tm===t?'sel':''} ${disabled.has(t)?'dis':''}" data-time="${t}">${t}</div>`).join('')}
      </div>`;
    body=`<div class="s-tag">Шаг 4</div><div class="s-title">Выберите время</div>
    <div class="s-sub">${doc.name} · ${dt.getDate()} ${MONS_F[dt.getMonth()]}</div>
    ${G('Утро ☀️','morning')}${G('День 🌤','afternoon')}${G('Вечер 🌆','evening')}`;
  }

  else if(step===5){
    body=`<div class="s-tag">Шаг 5</div><div class="s-title">Ваши данные</div>
    <div class="s-sub">Укажите контактную информацию</div>
    <div class="fg"><label>Имя и фамилия</label><input class="fi" id="iname" type="text" placeholder="Иван Иванов" value="${uname}"></div>
    <div class="fg"><label>Номер телефона</label><input class="fi" id="iphone" type="tel" placeholder="+7 (___) ___-__-__" value="${uphone}"></div>
    <div class="fg"><label>Комментарий (необязательно)</label><textarea class="fi" id="icmt" placeholder="Опишите жалобу или пожелание...">${ucmt}</textarea></div>`;
  }

  else if(step===6){
    body=`<div class="s-tag">Шаг 6</div><div class="s-title">Подтверждение</div>
    <div class="s-sub">Проверьте данные перед записью</div>
    <div class="smr">
      <div class="smr-head">
        <div class="smr-head-title">Запись к специалисту</div>
        <div class="smr-head-doc">${doc.name}</div>
        <div style="font-size:13px;color:rgba(255,255,255,.75);margin-top:4px">${doc.role}</div>
      </div>
      <div class="smr-body">
        <div class="smr-row"><span class="smr-k">Услуга</span><span class="smr-v">${svc.name}</span></div>
        <div class="smr-row"><span class="smr-k">Стоимость</span><span class="smr-v" style="color:#7EA8FF">${svc.price}</span></div>
        <div class="smr-row"><span class="smr-k">Длительность</span><span class="smr-v">${svc.dur}</span></div>
        <div class="smr-row"><span class="smr-k">Дата и время</span><span class="smr-v">${dt.getDate()} ${MONS_F[dt.getMonth()]}, ${tm}</span></div>
        <div class="smr-row"><span class="smr-k">Имя</span><span class="smr-v">${uname}</span></div>
        <div class="smr-row"><span class="smr-k">Телефон</span><span class="smr-v">${uphone}</span></div>
        ${ucmt?`<div class="smr-row"><span class="smr-k">Комментарий</span><span class="smr-v">${ucmt}</span></div>`:''}
      </div>
    </div>`;
  }

  const labels=['','Далее','Далее','Далее','Далее','Далее','Подтвердить запись'];
  const disabled_btn=(step===1&&!doc)||(step===2&&!svc)||(step===3&&!dt)||(step===4&&!tm)||(step===5&&(!uname.trim()||!uphone.trim()));

  return rHdr(step>1)+rProg()+`
    <div class="content">${body}</div>
    <div class="bbar"><button class="btn" ${disabled_btn?'disabled':''} onclick="next()">${labels[step]||'Далее'}</button></div>`;
}

function rSuccess(){
  return `<div class="content">
    <div class="suc">
      <div class="suc-ring"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="suc-title">Вы записаны! 🎉</div>
      <div class="suc-desc">${doc.name}<br>${dt.getDate()} ${MONS_F[dt.getMonth()]} в ${tm}<br>${svc.name}</div>
      <div class="suc-card">
        <div class="suc-row"><span>Врач</span><span>${doc.name}</span></div>
        <div class="suc-row"><span>Услуга</span><span>${svc.name}</span></div>
        <div class="suc-row"><span>Дата</span><span>${dt.getDate()} ${MONS_F[dt.getMonth()]}</span></div>
        <div class="suc-row"><span>Время</span><span>${tm}</span></div>
        <div class="suc-row"><span>Телефон</span><span>${uphone}</span></div>
      </div>
    </div>
    <div class="bbar"><button class="btn" onclick="view='main';render()">На главную</button></div>
  </div>`;
}

function rRec(){
  return rHdr()+ `<div class="content">
    <div class="s-title" style="margin-bottom:16px">Мои записи</div>
    ${records.length===0?`
      <div class="empty"><span class="empty-ico">📋</span><p>Нет активных записей.<br>Запишитесь на приём прямо сейчас.</p></div>`:`
      ${records.map(r=>`
        <div class="rec-card">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <span class="badge badge-green">✓ Подтверждено</span>
          </div>
          <div class="rec-doc">${r.doctor}</div>
          <div class="rec-svc">${r.service}</div>
          <div class="rec-date">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${r.date} в ${r.time}
          </div>
          <div class="rec-actions">
            <button class="rec-btn rec-btn-detail">Подробнее</button>
            <button class="rec-btn rec-btn-cancel">Отменить</button>
          </div>
        </div>`).join('')}`}
  </div>${rTabs()}`;
}

function rHist(){
  return rHdr()+ `<div class="content">
    <div class="s-title" style="margin-bottom:16px">История визитов</div>
    <div class="empty"><span class="empty-ico">🕐</span><p>История пуста.<br>Здесь появятся прошедшие визиты.</p></div>
  </div>${rTabs()}`;
}

function goBack(){
  if(step>1){step--;if(tg.HapticFeedback)tg.HapticFeedback.impactOccurred('light');render();}
}

function next(){
  if(step===5){
    const n=document.getElementById('iname'),p=document.getElementById('iphone'),c=document.getElementById('icmt');
    if(n)uname=n.value;if(p)uphone=p.value;if(c)ucmt=c.value;
  }
  if(step===6){
    records.push({doctor:doc.name,service:svc.name,date:`${dt.getDate()} ${MONS_F[dt.getMonth()]}`,time:tm});
    const payload={doctor:doc.name,specialty:doc.role,service:svc.name,price:svc.price,date:`${dt.getDate()} ${MONS_F[dt.getMonth()]}`,time:tm,name:uname,phone:uphone,comment:ucmt};
    try{tg.sendData(JSON.stringify(payload));}catch(e){}
    if(tg.HapticFeedback)tg.HapticFeedback.notificationOccurred('success');
  }
  step++;
  if(tg.HapticFeedback&&step<7)tg.HapticFeedback.impactOccurred('light');
  render();
}

function updBtn(){
  const b=document.querySelector('.btn');if(!b)return;
  if(step===5){b.disabled=!(uname.trim()&&uphone.trim());}
}

function bind(){
  document.querySelectorAll('[data-doc]').forEach(el=>el.addEventListener('click',()=>{
    doc=DOCTORS.find(d=>d.id===+el.dataset.doc);svc=null;
    if(tg.HapticFeedback)tg.HapticFeedback.selectionChanged();render();
  }));
  document.querySelectorAll('[data-svc]').forEach(el=>el.addEventListener('click',()=>{
    svc=SERVICES[doc.id].find(s=>s.id===el.dataset.svc);
    if(tg.HapticFeedback)tg.HapticFeedback.selectionChanged();render();
  }));
  document.querySelectorAll('[data-date]').forEach(el=>el.addEventListener('click',()=>{
    dt=dates()[+el.dataset.date];
    if(tg.HapticFeedback)tg.HapticFeedback.selectionChanged();render();
  }));
  document.querySelectorAll('[data-time]').forEach(el=>el.addEventListener('click',()=>{
    tm=el.dataset.time;
    if(tg.HapticFeedback)tg.HapticFeedback.selectionChanged();render();
  }));
  const n=document.getElementById('iname'),p=document.getElementById('iphone');
  if(n)n.addEventListener('input',()=>{uname=n.value;updBtn();});
  if(p)p.addEventListener('input',()=>{uphone=p.value;updBtn();});
}

render();
</script>
</body>
</html>
